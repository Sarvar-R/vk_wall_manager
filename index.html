<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VK Token Getter</title>
</head>
<body>
  <h1>Получение user access token</h1>
  <button id="getTokenBtn">Получить токен</button>
  <pre id="result" style="white-space: pre-wrap; word-break: break-word;"></pre>

  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    const APP_ID = 12345678; // <-- сюда вставь app_id своего mini app
    const SCOPES = "wall,photos,groups";

    const result = document.getElementById("result");
    const btn = document.getElementById("getTokenBtn");

    async function init() {
      try {
        await vkBridge.send("VKWebAppInit");
        result.textContent = "VK Bridge инициализирован. Нажми кнопку.";
      } catch (e) {
        result.textContent = "Ошибка инициализации VK Bridge: " + JSON.stringify(e, null, 2);
      }
    }

    async function getToken() {
      try {
        const data = await vkBridge.send("VKWebAppGetAuthToken", {
          app_id: APP_ID,
          scope: SCOPES
        });

        result.textContent =
          "ACCESS TOKEN:\\n\\n" + data.access_token +
          "\\n\\nSCOPE:\\n" + data.scope;
      } catch (e) {
        result.textContent = "Ошибка получения токена:\\n" + JSON.stringify(e, null, 2);
      }
    }

    btn.addEventListener("click", getToken);
    init();
  </script>
</body>
</html>
