<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VK token debug</title>
</head>
<body>
  <button id="btn">Получить user token</button>
  <pre id="out" style="white-space: pre-wrap; word-break: break-word;"></pre>

  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    const APP_ID = 54536138; // <-- твой app_id
    const out = document.getElementById("out");

    document.getElementById("btn").onclick = async () => {
      try {
        out.textContent = "VKWebAppInit...\n";
        await vkBridge.send("VKWebAppInit");
        out.textContent += "OK\n\n";

        out.textContent += "VKWebAppGetAuthToken...\n";
        const data = await vkBridge.send("VKWebAppGetAuthToken", {
          app_id: APP_ID,
          scope: "wall,photos,groups"
        });

        out.textContent += JSON.stringify(data, null, 2);
      } catch (e) {
        out.textContent += "ERROR:\n" + JSON.stringify(e, null, 2);
      }
    };
  </script>
</body>
</html>
